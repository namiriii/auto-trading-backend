server:
  port: 8081



spring:
  datasource:
    url: jdbc:h2:file:./data/testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: create

app:
  strategies:
    - PRICE
    - READY_COUNT
    - MOVING_AVERAGE
    - NOT_HOLDING

  strategy-config:
    price:
      target-price: 100000000
    ready-count:
      max-ready-count: 3
    moving-average:
      period: 5

  upbit:
    market: KRW-BTC

